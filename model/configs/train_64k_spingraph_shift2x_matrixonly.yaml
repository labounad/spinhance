# spingraph_decoder, shift-weighted 2x, MATRIX-ONLY (NO Stage 2 / no spectral loss).
# Identical to train_64k_spingraph_shift2x_spectral.yaml EXCEPT it never adds the
# surrogate_spectral term — pure matrix loss the whole run. The A/B control that
# isolates whether the spectral consistency term helps under the new shift weighting.
run:
  name: spingraph_shift2x_matrixonly
  output_dir: model/runs

data:
  records: mol_to_spin_system/data/spin_systems_chembl.json
  spectra: simulation/data/spectra
  field: 90
  split: none

model:
  name: spingraph_decoder
  size: medium
  dim: 256
  enc_layers: 2
  dec_layers: 4
  n_heads: 8
  dropout: 0.1

loss:
  name: composite
  terms:
    - name: matrix
      weight: 1.0
      weights:                  # shift weighted 2x (same as the spectral run)
        shift: 2.0
        jmag: 1.0
        presence: 0.5
        deg: 0.5

training:
  epochs: 100
  batch_size: 256
  lr: 0.0003
  weight_decay: 0.01
  amp: bf16
  warmup_frac: 0.05
  lr_stable_frac: 0.60
  lr_min_factor: 0.40
  grad_clip: 1.0
  patience: 20
  num_workers: 8
  val_every: 1
  seed: 0

diagnostics:
  enabled: true
  log_every_steps: 50
  probe_every_epochs: 5
  probe_count: 16
