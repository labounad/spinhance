# Stage-1 supervised matrix baseline — the stable reference run.
run:
  name: baseline_matrix
  output_dir: model/runs

data:
  records: mol_to_spin_system/data/spin_systems.json   # 1072-mol preliminary set
  spectra: simulation/data/spectra
  field: 90
  split: scaffold

model:
  name: resnet1d_attention_pool
  size: small
  dropout: 0.1

loss:
  name: composite
  terms:
    - name: matrix
      weight: 1.0

training:
  epochs: 80
  batch_size: 128
  lr: 0.0003
  weight_decay: 0.01
  amp: bf16
  warmup_frac: 0.03
  patience: 12
  num_workers: 0
  val_every: 1
  seed: 0

diagnostics:
  enabled: true
  log_every_steps: 25
  probe_every_epochs: 5
  probe_count: 16
