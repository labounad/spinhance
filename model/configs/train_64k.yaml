# Full 64k ChEMBL training run for the rebuilt trainer (GPU).
# Stage-1 matrix baseline; swap the loss term to `hungarian` to use the
# permutation-invariant graph loss instead.
run:
  name: rebuild64k
  output_dir: model/runs

data:
  records: mol_to_spin_system/data/spin_systems_chembl.json   # 64,476 molecules
  spectra: simulation/data/spectra
  field: 90
  # NOTE: scaffold splitting crashes on RDKit 2026.03 (STEREOANY double bonds in
  # the 64k set — see model_legacy/SUGGESTIONS.md §6). Use molecule + dedup split.
  split: none

model:
  name: resnet1d_attention_pool
  size: medium
  dropout: 0.1

loss:
  name: composite
  terms:
    - name: matrix
      weight: 1.0

training:
  epochs: 80
  batch_size: 256
  lr: 0.0003
  weight_decay: 0.01
  amp: bf16
  warmup_frac: 0.03
  patience: 15
  num_workers: 8
  val_every: 1
  seed: 0

diagnostics:
  enabled: true
  log_every_steps: 50
  probe_every_epochs: 5
  probe_count: 16
